<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insights — Working Excellence</title>
<meta http-equiv="refresh" content="0; url=blog.html"/>
<link rel="canonical" href="blog.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.redirect-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--grey-950);text-align:center;padding:40px 24px}
.redirect-inner{max-width:460px}
.redirect-spinner{width:40px;height:40px;border:2px solid var(--grey-700);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 28px}
@keyframes spin{to{transform:rotate(360deg)}}
.redirect-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:12px}
.redirect-text{font-size:.9rem;color:var(--grey-400);line-height:1.7;margin-bottom:20px}
.redirect-link{font-size:.85rem;color:var(--orange);text-decoration:none}
.redirect-link:hover{text-decoration:underline}
</style>
<script>window.location.replace("blog.html");</script>
</head>
<body>
<div class="redirect-page">
  <div class="redirect-inner">
    <div class="redirect-spinner"></div>
    <div class="redirect-label">Redirecting</div>
    <p class="redirect-text">Insights has moved to our Blog. Taking you there now.</p>
    <a href="blog.html" class="redirect-link">Click here if you are not redirected automatically</a>
  </div>
</div>
</body>
</html>
